title: "Kaikkonen Lab"
subtitle: "Chromatin, RNA & Gene Regulation"
description: "Cardiovascular epigenomics, functional genomics, and gene regulation in health and disease"
header: "images/banner.png"
footer: "images/uef_background.jpg"
proofer: false

links:
  email: contact@kaikkonen-lab.com
  orcid: 0000-0001-8713-9213
  google-scholar: ETJoidYAAAAJ
  github: kaikkonen-lab
  twitter: kaikkonen-lab
  youtube: kaikkonen-lab

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      type: "members"
    values:
      layout: member
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  members:
    output: true
  posts:
    output: true

plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

highlighter: rouge
theme: null

sass:
  sass_dir: _styles

include:
  - _styles
  - _scripts

exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
